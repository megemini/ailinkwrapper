<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 450px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #ffffff;
      color: #09090b;
      font-size: 14px;
      line-height: 1.5;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid #e4e4e7;
    }
    
    .header img {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }
    
    h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }
    
    .container {
      padding: 16px;
    }
    
    .add-section {
      border: 1px solid #e4e4e7;
      border-radius: 6px;
      padding: 14px;
      margin-bottom: 16px;
      background: #fafafa;
    }
    
    input {
      width: 100%;
      padding: 8px 11px;
      border: 1px solid #e4e4e7;
      border-radius: 4px;
      margin-bottom: 10px;
      font-size: 13px;
      background: white;
      font-family: inherit;
    }
    
    input:focus {
      outline: none;
      border-color: #09090b;
      box-shadow: 0 0 0 2px rgba(9, 9, 11, 0.1);
    }
    
    input::placeholder {
      color: #71717a;
    }
    
    .button-group {
      display: flex;
      gap: 8px;
    }
    
    button {
      padding: 8px 12px;
      border: 1px solid #e4e4e7;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      flex: 1;
      background: white;
      color: #09090b;
      font-family: inherit;
    }
    
    button:hover {
      background: #f4f4f5;
      border-color: #d4d4d8;
    }
    
    button:active {
      background: #e4e4e7;
    }
    
    .add-btn {
      background: #09090b;
      color: white;
      border-color: #09090b;
    }
    
    .add-btn:hover {
      background: #27272a;
      border-color: #27272a;
    }
    
    .delete-btn {
      padding: 4px 8px;
      font-size: 12px;
      background: white;
      color: #ef4444;
      border-color: #fecaca;
      flex-shrink: 0;
    }
    
    .delete-btn:hover {
      background: #fef2f2;
      border-color: #ef4444;
    }
    
    .proxy-item {
      border: 1px solid #e4e4e7;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 10px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: white;
    }
    
    .proxy-item:hover {
      border-color: #d4d4d8;
      background: #fafafa;
    }
    
    .proxy-info {
      flex: 1;
      min-width: 0;
    }
    
    .proxy-label {
      font-weight: 500;
      color: #09090b;
      margin-bottom: 4px;
      font-size: 13px;
    }
    
    .proxy-url {
      font-size: 12px;
      color: #71717a;
      word-break: break-all;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
      line-height: 1.4;
    }
    
    #proxyList {
      max-height: 380px;
      overflow-y: auto;
    }
    
    #proxyList::-webkit-scrollbar {
      width: 6px;
    }
    
    #proxyList::-webkit-scrollbar-track {
      background: transparent;
    }
    
    #proxyList::-webkit-scrollbar-thumb {
      background: #d4d4d8;
      border-radius: 3px;
    }
    
    #proxyList::-webkit-scrollbar-thumb:hover {
      background: #a1a1aa;
    }
    
    .empty-state {
      text-align: center;
      color: #71717a;
      padding: 32px 16px;
      font-size: 13px;
      background: #fafafa;
      border: 1px solid #e4e4e7;
      border-radius: 6px;
      margin-top: 16px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 0 16px 16px 16px;
      border-bottom: 1px solid #e4e4e7;
    }

    .tab-btn {
      padding: 8px 14px;
      border: none;
      border-bottom: 2px solid transparent;
      background: none;
      color: #71717a;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .tab-btn:hover {
      color: #09090b;
    }

    .tab-btn.active {
      color: #09090b;
      border-bottom-color: #09090b;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .domain-item {
      border: 1px solid #e4e4e7;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 10px;
      background: white;
    }

    .domain-item:hover {
      border-color: #d4d4d8;
      background: #fafafa;
    }

    .domain-label {
      font-weight: 500;
      color: #09090b;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .domain-rule {
      font-size: 12px;
      color: #71717a;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
      line-height: 1.4;
    }

    .domain-item-content {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .domain-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="images/logo.png" alt="logo" />
    <h2>AI Link Wrapper</h2>
  </div>
  
  <div class="container">
    <!-- Tabs for switching modes -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="proxy-mode">Proxy URLs</button>
      <button class="tab-btn" data-tab="domain-mode">Domain Replace</button>
    </div>

    <!-- Proxy Mode Tab -->
    <div id="proxy-mode" class="tab-content active">
      <div class="add-section">
        <input type="text" id="labelInput" placeholder="Label (e.g., 'My Proxy')" />
        <input type="text" id="urlInput" placeholder="Proxy URL (e.g., 'https://example.com/api/')" />
        <div class="button-group">
          <button id="addBtn" class="add-btn">Add Proxy</button>
          <button id="cancelBtn" class="cancel-btn">Clear</button>
        </div>
      </div>
      <div id="proxyList">
        <div class="empty-state">No proxies configured yet</div>
      </div>
    </div>

    <!-- Domain Replace Mode Tab -->
    <div id="domain-mode" class="tab-content">
      <div class="add-section">
        <input type="text" id="domainLabelInput" placeholder="Label (e.g., 'Dev Server')" />
        <input type="text" id="domainSourceInput" placeholder="Original domain (e.g., 'foo.bar')" />
        <input type="text" id="domainTargetInput" placeholder="Replacement domain (e.g., 'xyz.abc')" />
        <div class="button-group">
          <button id="addDomainBtn" class="add-btn">Add Replace Rule</button>
          <button id="cancelDomainBtn" class="cancel-btn">Clear</button>
        </div>
      </div>
      <div id="domainList">
        <div class="empty-state">No domain replacements configured yet</div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
