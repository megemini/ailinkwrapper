<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 400px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
    }
    h2 {
      margin-top: 0;
      color: #333;
      font-size: 18px;
    }
    .proxy-item {
      background: white;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .proxy-info {
      flex: 1;
    }
    .proxy-label {
      font-weight: 500;
      color: #333;
      margin-bottom: 4px;
    }
    .proxy-url {
      font-size: 12px;
      color: #666;
      word-break: break-all;
    }
    button {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      font-size: 12px;
    }
    button:hover {
      background: #f0f0f0;
    }
    .delete-btn {
      color: #d32f2f;
      padding: 6px 10px;
    }
    .add-section {
      background: white;
      border: 1px dashed #ddd;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .button-group {
      display: flex;
      gap: 8px;
    }
    .button-group button {
      flex: 1;
    }
    .add-btn {
      background: #1976d2;
      color: white;
      border-color: #1976d2;
    }
    .add-btn:hover {
      background: #1565c0;
    }
    .cancel-btn {
      background: white;
      color: #333;
    }
    #proxyList {
      max-height: 400px;
      overflow-y: auto;
    }
    .empty-state {
      text-align: center;
      color: #999;
      padding: 20px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h2>Link Proxy Opener</h2>
  
  <div class="add-section">
    <input type="text" id="labelInput" placeholder="Label (e.g., 'Jina Reader')" />
    <input type="text" id="urlInput" placeholder="Proxy URL (e.g., 'https://r.jina.ai/')" />
    <div class="button-group">
      <button id="addBtn" class="add-btn">Add Proxy</button>
      <button id="cancelBtn" class="cancel-btn">Clear</button>
    </div>
  </div>

  <div id="proxyList">
    <div class="empty-state">No proxies configured yet</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
